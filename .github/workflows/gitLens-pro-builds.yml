name: GitLens PRO Automated Build & Release

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: '上游仓库分支'
        required: true
        default: 'main'
      release_version:
        description: '发布版本号（可选）'
        required: false
  # 定时触发（每天凌晨2点）
  schedule:
    - cron: '0 2 * * *'
  # 上游仓库触发（需要在上游仓库配置webhook）
  repository_dispatch:
    types: [upstream-update]

permissions:
  contents: write
  packages: write
  issues: read
  pull-requests: read

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 60

    steps:
      # 1. 环境准备
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'
          cache-dependency-path: '**/pnpm-lock.yaml'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      # 2. 版本号检查机制
      - name: Get current project version
        id: get-current-version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "Current project version: $CURRENT_VERSION"

      - name: Get latest release version
        id: get-latest-release
        run: |
          # 获取最新Release版本号，如果没有Release则返回空
          LATEST_RELEASE=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name // empty')
          # 移除可能的"v"前缀，统一格式
          LATEST_VERSION=$(echo "$LATEST_RELEASE" | sed 's/^v//')
          echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          echo "Latest release version: $LATEST_VERSION"

      - name: Compare versions
        id: compare-versions
        run: |
          CURRENT_VERSION=${{ steps.get-current-version.outputs.current_version }}
          LATEST_VERSION=${{ steps.get-latest-release.outputs.latest_version }}

          echo "=== Version Comparison ==="
          echo "Current project version: $CURRENT_VERSION"
          echo "Latest release version: $LATEST_VERSION"

          # 检查是否有最新Release
          if [ -z "$LATEST_VERSION" ]; then
            echo "No existing releases found. Proceeding with build."
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "decision=proceed" >> $GITHUB_OUTPUT
            echo "reason=No existing releases found"
            exit 0
          fi

          # 精确比对版本号
          if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
            echo "Version match found. No changes detected."
            echo "version_changed=false" >> $GITHUB_OUTPUT
            echo "decision=stop" >> $GITHUB_OUTPUT
            echo "reason=Version $CURRENT_VERSION already released"
          else
            echo "Version mismatch found. New version detected."
            echo "version_changed=true" >> $GITHUB_OUTPUT
            echo "decision=proceed" >> $GITHUB_OUTPUT
            echo "reason=New version $CURRENT_VERSION detected (latest: $LATEST_VERSION)"
          fi

      - name: Stop workflow if version unchanged
        if: steps.compare-versions.outputs.decision == 'stop'
        run: |
          echo "::error::Workflow stopped because version ${{ steps.get-current-version.outputs.current_version }} is already released."
          echo "::notice::Use a different version number or delete the existing release to proceed."
          exit 1

      # 3. 代码同步
      - name: Add upstream remote
        run: git remote add upstream https://github.com/gitkraken/vscode-gitlens.git

      - name: Fetch upstream changes
        run: git fetch upstream --all --tags

      - name: Merge upstream changes
        run: |
          git checkout ${{ github.ref_name }}
          git merge upstream/${{ github.event.inputs.upstream_branch || 'main' }} --allow-unrelated-histories -m "Merge upstream changes"

      # 4. 代码修改 - 解锁PRO功能
      - name: Modify subscription state calculation
        run: |
          # 修改订阅状态计算逻辑，强制返回Paid状态
          sed -i 's/computeSubscriptionState(subscription)/SubscriptionState.Paid/g' src/plus/gk/subscriptionService.ts
          sed -i 's/return SubscriptionState.Community/return SubscriptionState.Paid/g' src/plus/gk/utils/subscription.utils.ts
          sed -i 's/return SubscriptionState.TrialExpired/return SubscriptionState.Paid/g' src/plus/gk/utils/subscription.utils.ts
          sed -i 's/return SubscriptionState.TrialReactivationEligible/return SubscriptionState.Paid/g' src/plus/gk/utils/subscription.utils.ts

      - name: Modify default subscription plan
        run: |
          # 修改默认订阅计划为enterprise
          sed -i 's/community/enterprise/g' src/plus/gk/utils/subscription.utils.ts
          sed -i 's/community-with-account/enterprise/g' src/plus/gk/utils/subscription.utils.ts

      - name: Modify feature access checks
        run: |
          # 修改功能访问检查，允许所有PRO功能
          sed -i 's/isProFeature(/true || isProFeature(/g' src/features.ts
          sed -i 's/isAdvancedFeature(/true || isAdvancedFeature(/g' src/features.ts

      # 5. 代码推送
      - name: Configure git user
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

      - name: Commit changes
        run: |
          git add .
          git commit -m "Unlock all PRO features and set default plan to enterprise"

      - name: Push changes
        run: git push origin ${{ github.ref_name }}

      # 6. 构建与发布
      - name: Build VSIX package
        run: pnpm run package

      - name: Get VSIX file path
        id: get-vsix
        run: |
          VSIX_FILE=$(find . -name "*.vsix" -type f | head -1)
          echo "vsix_file=$VSIX_FILE" >> $GITHUB_OUTPUT
          echo "vsix_filename=$(basename $VSIX_FILE)" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create-release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.get-current-version.outputs.current_version }}
          release_name: GitLens PRO v${{ steps.get-current-version.outputs.current_version }}
          body: |
            ## GitLens PRO 自动化构建发布

            ### 发布信息
            - 构建编号: ${{ github.run_number }}
            - 构建时间: ${{ github.event.head_commit.timestamp || formatDate(github.event.repository.updated_at, 'YYYY-MM-DD HH:mm:ss') }}
            - 上游分支: ${{ github.event.inputs.upstream_branch || 'main' }}
            - 版本变更: ${{ steps.get-latest-release.outputs.latest_version }} → ${{ steps.get-current-version.outputs.current_version }}

            ### 功能变更
            - 解锁所有PRO功能
            - 设置默认订阅计划为enterprise
            - 同步上游仓库最新代码

            ### 构建文件
            - VSIX包: ${{ steps.get-vsix.outputs.vsix_filename }}
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create-release.outputs.upload_url }}
          asset_path: ${{ steps.get-vsix.outputs.vsix_file }}
          asset_name: ${{ steps.get-vsix.outputs.vsix_filename }}
          asset_content_type: application/vsix

      # 7. 错误处理与通知
      - name: Send notification on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const notificationMessage = `GitLens PRO构建失败: ${context.workflow} #${context.runNumber}`;
            console.log(notificationMessage);

            // 可以添加Slack、Discord或Email通知
            // 示例：发送到GitHub Issues
            // await github.rest.issues.create({
            //   owner: context.repo.owner,
            //   repo: context.repo.repo,
            //   title: notificationMessage,
            //   body: `构建失败详情: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            // });

      - name: Cleanup
        if: always()
        run: |
          # 清理临时文件
          rm -f *.vsix
          git remote remove upstream || true
