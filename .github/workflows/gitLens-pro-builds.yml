name: GitLens PRO Automated Build & Release

on:
    # 手动触发
    workflow_dispatch:
        inputs:
            upstream_repository:
                description: '上游仓库'
                required: false
                default: 'gitkraken/vscode-gitlens'
            upstream_branch:
                description: '上游仓库分支'
                required: false
                default: 'main'
            release_version:
                description: '发布版本号（可选）'
                required: false
    # 定时触发（每天凌晨2点）
    schedule:
        - cron: '0 2 * * *'
    # 上游仓库触发（需要在上游仓库配置webhook）
    repository_dispatch:
        types: [upstream-update]

permissions:
    contents: write
    packages: write
    issues: read
    pull-requests: read

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        environment: production
        timeout-minutes: 60

        steps:
            # 1. 环境准备 - 首先检出运行工作流的仓库，然后同步上游仓库代码
            - name: Checkout running workflow repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  token: ${{ secrets.GITHUB_TOKEN }}
                  ref: ${{ github.ref_name }}

            - name: Add upstream repository as remote
              run: |
                  UPSTREAM_REPO=${{ github.event.inputs.upstream_repository || 'gitkraken/vscode-gitlens' }}
                  git remote add upstream https://github.com/${UPSTREAM_REPO}.git
                  git fetch upstream

            - name: Pull latest code from upstream branch
              run: |
                  UPSTREAM_BRANCH=${{ github.event.inputs.upstream_branch || 'main' }}
                  git pull upstream $UPSTREAM_BRANCH --allow-unrelated-histories

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  # version-from-package: true
                  run_install: false

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '22.x'
                  cache: 'pnpm'
                  cache-dependency-path: '**/pnpm-lock.yaml'

            - name: Install dependencies
              run: pnpm install

            # 2. 版本号检查机制
            - name: Get current project version
              id: get-current-version
              run: |
                  CURRENT_VERSION=$(node -p "require('./package.json').version")
                  echo "current_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
                  echo "Current project version: $CURRENT_VERSION"

            - name: Get latest release version
              id: get-latest-release
              run: |
                  # 获取最新Release版本号，如果没有Release则返回空
                  LATEST_RELEASE=$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/latest | jq -r '.tag_name // empty')
                  # 移除可能的"v"前缀，统一格式
                  LATEST_VERSION=$(echo "$LATEST_RELEASE" | sed 's/^v//')
                  echo "latest_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
                  echo "Latest release version: $LATEST_VERSION"

            - name: Compare versions
              id: compare-versions
              run: |
                  CURRENT_VERSION=${{ steps.get-current-version.outputs.current_version }}
                  LATEST_VERSION=${{ steps.get-latest-release.outputs.latest_version }}

                  echo "=== Version Comparison ==="
                  echo "Current project version: $CURRENT_VERSION"
                  echo "Latest release version: $LATEST_VERSION"

                  # 检查是否有最新Release
                  if [ -z "$LATEST_VERSION" ]; then
                    echo "No existing releases found. Proceeding with build."
                    echo "version_changed=true" >> $GITHUB_OUTPUT
                    echo "decision=proceed" >> $GITHUB_OUTPUT
                    echo "reason=No existing releases found"
                    exit 0
                  fi

                  # 精确比对版本号
                  if [ "$CURRENT_VERSION" = "$LATEST_VERSION" ]; then
                    echo "Version match found. No changes detected."
                    echo "version_changed=false" >> $GITHUB_OUTPUT
                    echo "decision=stop" >> $GITHUB_OUTPUT
                    echo "reason=Version $CURRENT_VERSION already released"
                  else
                    echo "Version mismatch found. New version detected."
                    echo "version_changed=true" >> $GITHUB_OUTPUT
                    echo "decision=proceed" >> $GITHUB_OUTPUT
                    echo "reason=New version $CURRENT_VERSION detected (latest: $LATEST_VERSION)"
                  fi

            - name: Stop workflow if version unchanged
              if: steps.compare-versions.outputs.decision == 'stop'
              run: |
                  echo "::error::Workflow stopped because version ${{ steps.get-current-version.outputs.current_version }} is already released."
                  echo "::notice::Use a different version number or delete the existing release to proceed."
                  exit 1

            # 4. 代码修改 - 解锁PRO功能
            - name: Initialize patch report
              id: patch-report-init
              run: |
                  # 创建补丁报告文件
                  echo '{"patches":[]}' > patch-report.json
                  echo "Patch report initialized"

            - name: Apply structured patches for PRO feature unlocking
              id: apply-patches
              run: |
                  # 定义补丁列表 - 不依赖行号，使用函数名和唯一模式
                  declare -a patches=(
                    # patch-001: 修改computeSubscriptionState函数，将所有订阅视为付费订阅
                    "patch-001:subscription.utils.computeSubscriptionState:src/plus/gk/utils/subscription.utils.ts:function:computeSubscriptionState:export function computeSubscriptionState(subscription: Optional<Subscription, 'state'>): SubscriptionState {\n\treturn SubscriptionState.Paid; // 所有订阅均视为付费订阅，强制返回Paid状态\n}"

                    # patch-002: 修改getSubscriptionNextPaidPlanId函数，始终返回enterprise
                    "patch-002:subscription.utils.getSubscriptionNextPaidPlanId:src/plus/gk/utils/subscription.utils.ts:function:getSubscriptionNextPaidPlanId:export function getSubscriptionNextPaidPlanId(subscription: Optional<Subscription, 'state'>): PaidSubscriptionPlanIds {\n\treturn 'enterprise'; // 始终返回enterprise\n}"

                    # patch-003: 修改getSubscriptionPlan函数，始终返回enterprise计划
                    "patch-003:subscription.utils.getSubscriptionPlan:src/plus/gk/utils/subscription.utils.ts:function:getSubscriptionPlan:export function getSubscriptionPlan(\n\tid: SubscriptionPlanIds,\n\tbundle: boolean,\n\ttrialReactivationCount: number,\n\torganizationId: string | undefined,\n\tstartedOn?: Date,\n\texpiresOn?: Date,\n\tcancelled: boolean = false,\n\tnextTrialOptInDate?: string,\n): SubscriptionPlan {\n\treturn {\n\t\tid: 'enterprise', // 始终返回enterprise\n\t\tname: getSubscriptionProductPlanName('enterprise'),\n\t\tbundle: bundle,\n\t\tcancelled: cancelled,\n\t\torganizationId: organizationId,\n\t\ttrialReactivationCount: trialReactivationCount,\n\t\tnextTrialOptInDate: nextTrialOptInDate,\n\t\tstartedOn: (startedOn ?? new Date()).toISOString(),\n\t\texpiresOn: expiresOn != null ? expiresOn.toISOString() : undefined,\n\t};\n}"

                    # patch-004: 修改getSubscriptionPlanName函数，始终返回Enterprise
                    "patch-004:subscription.utils.getSubscriptionPlanName:src/plus/gk/utils/subscription.utils.ts:function:getSubscriptionPlanName:/** Gets the plan name for the given plan id */\nexport function getSubscriptionPlanName(\n\tid: SubscriptionPlanIds,\n): 'Community' | 'Student' | 'Pro' | 'Advanced' | 'Business' | 'Enterprise' {\n\treturn 'Enterprise'; // 始终返回Enterprise\n}"

                    # patch-005: 修改getSubscriptionPlanType函数，始终返回ENTERPRISE
                    "patch-005:subscription.utils.getSubscriptionPlanType:src/plus/gk/utils/subscription.utils.ts:function:getSubscriptionPlanType:/** Only for gk.dev `planType` query param */\nexport function getSubscriptionPlanType(\n\tid: SubscriptionPlanIds,\n): 'STUDENT' | 'PRO' | 'ADVANCED' | 'BUSINESS' | 'ENTERPRISE' {\n\treturn 'ENTERPRISE'; // 始终返回ENTERPRISE\n}"

                    # patch-006: 修改isSubscriptionPaid函数，所有计划均视为付费计划
                    "patch-006:subscription.utils.isSubscriptionPaid:src/plus/gk/utils/subscription.utils.ts:function:isSubscriptionPaid:export function isSubscriptionPaid(subscription: Optional<Subscription, 'state'>): boolean {\n\treturn true; // 所有计划均视为付费计划，允许访问所有PRO级别功能\n}"

                    # patch-007: 修改isSubscriptionPaidPlan函数，所有计划均视为付费计划
                    "patch-007:subscription.utils.isSubscriptionPaidPlan:src/plus/gk/utils/subscription.utils.ts:function:isSubscriptionPaidPlan:export function isSubscriptionPaidPlan(id: SubscriptionPlanIds): id is PaidSubscriptionPlanIds {\n\treturn true; // 所有计划均视为付费计划，允许访问所有PRO级别功能\n}"

                    # patch-008: 修改convertLicenseTypeToPlanId函数，始终返回enterprise
                    "patch-008:checkin.utils.convertLicenseTypeToPlanId:src/plus/gk/utils/checkin.utils.ts:function:convertLicenseTypeToPlanId:function convertLicenseTypeToPlanId(licenseType: GKLicenseType): SubscriptionPlanIds {\n\treturn 'enterprise'; // 始终返回enterprise\n}"

                    # patch-009: 修改subscriptionService.changeSubscription中的状态计算逻辑，确保订阅计划始终为enterprise
                    "patch-009:subscriptionService.changeSubscription:src/plus/gk/subscriptionService.ts:pattern:\tsubscription.state = computeSubscriptionState(subscription);\n\tassertSubscriptionState(subscription):\tsubscription.state = computeSubscriptionState(subscription);\n\t// 确保订阅计划始终为enterprise类型\n\tsubscription.plan.actual.id = 'enterprise';\n\tsubscription.plan.effective.id = 'enterprise';\n\tsubscription.plan.actual.name = 'GitLens Enterprise';\n\tsubscription.plan.effective.name = 'GitLens Enterprise';\n\tassertSubscriptionState(subscription);"
                  )

                  # 初始化补丁结果统计
                  total_patches=${#patches[@]}
                  successful_patches=0
                  failed_patches=0

                  # 应用每个补丁
                  for patch in "${patches[@]}"; do
                    IFS=":" read -r patch_id patch_name file_path match_type match_pattern patch_content <<< "$patch"

                    echo "\n=== Processing Patch: $patch_id - $patch_name ==="
                    echo "File: $file_path"
                    echo "Match Type: $match_type"
                    echo "Match Pattern: $match_pattern"

                    # 检查文件是否存在
                    if [ ! -f "$file_path" ]; then
                      echo "❌ ERROR: File $file_path not found"
                      failed_patches=$((failed_patches+1))
                      # 更新补丁报告
                      jq --arg id "$patch_id" --arg name "$patch_name" --arg file "$file_path" --arg status "failed" --arg result "File not found" --arg match_type "$match_type" --arg match_pattern "$match_pattern" '.patches += [{"id":$id,"name":$name,"file":$file,"status":$status,"result":$result,"match_type":$match_type,"match_pattern":$match_pattern}]' patch-report.json > temp.json && mv temp.json patch-report.json
                      continue
                    fi

                    # 应用补丁 - 根据匹配类型使用不同的策略
                    case "$match_type" in
                      "function")
                        # 使用函数名匹配，替换整个函数
                        function_name="$match_pattern"
                        echo "=== Applying function-based patch for: $function_name ==="

                        # 添加调试信息：显示替换前文件中所有匹配函数的位置
                        echo "Before removal - all occurrences of $function_name:"
                        grep -n "export function $function_name\|function $function_name" "$file_path"

                        # 采用精确的函数匹配和修改策略
                        # 1. 查找目标函数定义
                        echo "Finding target function definition for $function_name..."
                        # 只查找第一个匹配的函数定义
                        func_line=$(grep -n "^export function $function_name\s*\(|^function $function_name\s*\(" "$file_path" | head -1 | cut -d: -f1)

                        if [ -n "$func_line" ]; then
                          echo "Found function at line $func_line, will modify it..."

                          # 2. 使用awk精确替换目标函数，保留其他内容
                          awk -v func="$function_name" -v new_func="$patch_content" '
                          BEGIN {
                            in_target_func = 0;
                            brace_count = 0;
                            found = 0;
                          }
                          {
                            if (!in_target_func) {
                              # 精确匹配目标函数定义
                              if ($0 ~ "^export function " func "\s*\(|^function " func "\s*\(") {
                                in_target_func = 1;
                                found = 1;
                                # 输出新的函数内容
                                printf "%s\n", new_func;
                                # 计算当前行的大括号数量
                                brace_count = gsub(/\{/, "", $0) - gsub(/\}/, "", $0);
                              } else {
                                # 不是目标函数，正常输出
                                print;
                              }
                            } else {
                              # 在目标函数内部，计算大括号数量
                              brace_count += gsub(/\{/, "", $0) - gsub(/\}/, "", $0);
                              # 当大括号数量为0时，函数结束
                              if (brace_count <= 0) {
                                in_target_func = 0;
                              }
                              # 跳过原函数内容
                            }
                          }
                          END {
                            # 如果函数不存在，添加到文件末尾
                            if (!found) {
                              print "\n" new_func;
                            }
                          }
                          ' "$file_path" > "$file_path.tmp" && mv "$file_path.tmp" "$file_path"
                        else
                          echo "Function $function_name not found, adding to file..."
                          echo -e "\n$patch_content" >> "$file_path"
                        fi

                        # 添加调试信息：显示替换后文件中是否还有匹配函数
                        echo "After removal - remaining occurrences of $function_name:"
                        grep -n "export function $function_name\|function $function_name" "$file_path" || echo "No occurrences found"

                        # 现在添加新的函数到文件末尾
                        echo "Adding new $function_name function..."
                        echo -e "\n$patch_content" >> "$file_path"

                        # 添加调试信息：显示添加后文件中匹配函数的位置
                        echo "After addition - occurrences of $function_name:"
                        grep -n "export function $function_name\|function $function_name" "$file_path"

                        # 添加验证步骤：确保每个函数只有一个定义
                        echo "Verifying function definition count..."
                        func_count=$(grep -c "^export function $function_name\s*\(|^function $function_name\s*\(" "$file_path")
                        if [ "$func_count" -ne 1 ]; then
                          echo "❌ ERROR: Found $func_count definitions of $function_name, expected 1"
                          exit 1
                        else
                          echo "✅ SUCCESS: Only 1 definition of $function_name found"
                        fi
                        ;;
                      "pattern")
                        # 使用唯一模式匹配，替换特定代码段
                        pattern="$match_pattern"
                        echo "=== Applying pattern-based patch for: $pattern ==="

                        # 使用更可靠的替换方式，避免重复替换
                        # 先检查是否已经存在替换后的内容，避免重复添加
                        if ! grep -q "subscription.plan.actual.id = 'enterprise'" "$file_path"; then
                          echo "Adding enterprise plan assignment..."
                          # 将 enterprise 赋值行插入到 computeSubscriptionState(...) 之后（如果存在匹配）
                          awk '
                          { print }
                          /subscription\.state = computeSubscriptionState\(subscription\);/ {
                            print "\tsubscription.plan.actual.id = '\''enterprise'\'';"
                            print "\tsubscription.plan.effective.id = '\''enterprise'\'';"
                            print "\tsubscription.plan.actual.name = '\''GitLens Enterprise'\'';"
                            print "\tsubscription.plan.effective.name = '\''GitLens Enterprise'\'';"
                          }
                          ' "$file_path" > "$file_path.tmp" && mv "$file_path.tmp" "$file_path"
                        else
                          echo "Enterprise plan assignment already exists, skipping..."
                        fi
                        ;;
                      *)
                        echo "❌ ERROR: Unknown match type: $match_type"
                        failed_patches=$((failed_patches+1))
                        jq --arg id "$patch_id" --arg name "$patch_name" --arg file "$file_path" --arg status "failed" --arg result "Unknown match type" --arg match_type "$match_type" --arg match_pattern "$match_pattern" '.patches += [{"id":$id,"name":$name,"file":$file,"status":$status,"result":$result,"match_type":$match_type,"match_pattern":$match_pattern}]' patch-report.json > temp.json && mv temp.json patch-report.json
                        continue
                        ;;
                    esac

                    # 针对patch-009的特殊验证
                    if [ "$patch_id" = "patch-009" ]; then
                      # 验证是否存在 enterprise 赋值语句或名称（更可靠的验证）
                      if grep -q "subscription.plan.actual.id = 'enterprise'" "$file_path" || grep -q "subscription.plan.actual.name = 'GitLens Enterprise'" "$file_path"; then
                        echo "✅ SUCCESS: Patch $patch_id applied successfully"
                        successful_patches=$((successful_patches+1))
                        jq --arg id "$patch_id" --arg name "$patch_name" --arg file "$file_path" --arg status "success" --arg result "Patch applied successfully" --arg match_type "$match_type" --arg match_pattern "$match_pattern" '.patches += [{"id":$id,"name":$name,"file":$file,"status":$status,"result":$result,"match_type":$match_type,"match_pattern":$match_pattern}]' patch-report.json > temp.json && mv temp.json patch-report.json
                      else
                        echo "❌ ERROR: Patch $patch_id verification failed"
                        failed_patches=$((failed_patches+1))
                        jq --arg id "$patch_id" --arg name "$patch_name" --arg file "$file_path" --arg status "failed" --arg result "Verification failed" --arg match_type "$match_type" --arg match_pattern "$match_pattern" '.patches += [{"id":$id,"name":$name,"file":$file,"status":$status,"result":$result,"match_type":$match_type,"match_pattern":$match_pattern}]' patch-report.json > temp.json && mv temp.json patch-report.json
                      fi
                    # 其他补丁的验证
                    elif grep -q "// 所有订阅均视为付费订阅" "$file_path" || grep -q "// 始终返回enterprise" "$file_path" || grep -q "// 确保订阅计划始终为enterprise类型" "$file_path" || grep -q "subscription.plan.actual.id = 'enterprise'" "$file_path" || grep -q "subscription.plan.actual.name = 'GitLens Enterprise'" "$file_path"; then
                      echo "✅ SUCCESS: Patch $patch_id applied successfully"
                      successful_patches=$((successful_patches+1))
                      jq --arg id "$patch_id" --arg name "$patch_name" --arg file "$file_path" --arg status "success" --arg result "Patch applied successfully" --arg match_type "$match_type" --arg match_pattern "$match_pattern" '.patches += [{"id":$id,"name":$name,"file":$file,"status":$status,"result":$result,"match_type":$match_type,"match_pattern":$match_pattern}]' patch-report.json > temp.json && mv temp.json patch-report.json
                    else
                      echo "❌ ERROR: Patch $patch_id verification failed"
                      failed_patches=$((failed_patches+1))
                      jq --arg id "$patch_id" --arg name "$patch_name" --arg file "$file_path" --arg status "failed" --arg result "Verification failed" --arg match_type "$match_type" --arg match_pattern "$match_pattern" '.patches += [{"id":$id,"name":$name,"file":$file,"status":$status,"result":$result,"match_type":$match_type,"match_pattern":$match_pattern}]' patch-report.json > temp.json && mv temp.json patch-report.json
                    fi
                  done

                  # 生成最终报告
                  echo "\n=== Patch Application Summary ==="
                  echo "Total patches: $total_patches"
                  echo "Successful: $successful_patches"
                  echo "Failed: $failed_patches"

                  # 更新补丁报告的摘要信息
                  jq --arg total "$total_patches" --arg successful "$successful_patches" --arg failed "$failed_patches" '.summary = {"total":$total,"successful":$successful,"failed":$failed}' patch-report.json > temp.json && mv temp.json patch-report.json

                  # 显示最终报告
                  echo "\n=== Final Patch Report ==="
                  cat patch-report.json | jq .

                  # 设置输出变量
                  echo "total_patches=$total_patches" >> $GITHUB_OUTPUT
                  echo "successful_patches=$successful_patches" >> $GITHUB_OUTPUT
                  echo "failed_patches=$failed_patches" >> $GITHUB_OUTPUT

            - name: Verify patch application results
              id: verify-patches
              run: |
                  # 检查补丁应用结果
                  successful_patches=${{ steps.apply-patches.outputs.successful_patches }}
                  total_patches=${{ steps.apply-patches.outputs.total_patches }}

                  if [ "$successful_patches" -eq "$total_patches" ]; then
                    echo "✅ All patches applied successfully!"
                    echo "verification_result=success" >> $GITHUB_OUTPUT
                  else
                    echo "❌ Some patches failed to apply. Please check the patch report."
                    echo "verification_result=failure" >> $GITHUB_OUTPUT
                    exit 1
                  fi

            - name: Test build after patches
              id: test-build
              run: |
                  # 运行构建测试，确保补丁应用后能正常构建
                  echo "Testing build after patch application..."
                  pnpm run build
                  echo "✅ Build test passed!"

            - name: Generate patch processing report
              id: generate-report
              run: |
                  # 生成人类可读的补丁报告
                  echo "# GitLens PRO Patch Processing Report" > patch-report.md
                  echo "" >> patch-report.md
                  echo "## Summary" >> patch-report.md
                  echo "- Total patches: ${{ steps.apply-patches.outputs.total_patches }}" >> patch-report.md
                  echo "- Successful: ${{ steps.apply-patches.outputs.successful_patches }}" >> patch-report.md
                  echo "- Failed: ${{ steps.apply-patches.outputs.failed_patches }}" >> patch-report.md
                  echo "" >> patch-report.md

                  echo "## Patch Details" >> patch-report.md
                  echo "" >> patch-report.md

                  # 从JSON报告中提取补丁详情
                  jq -r '.patches[] | "### Patch \(.id) - \(.name)\n- File: \(.file)\n- Match Type: \(.match_type)\n- Match Pattern: \(.match_pattern)\n- Purpose: \(.purpose // "N/A")\n- Status: **\(.status | ascii_upcase)**\n- Result: \(.result)\n"' patch-report.json >> patch-report.md

                  echo "" >> patch-report.md
                  echo "## Conclusion" >> patch-report.md
                  if [ "${{ steps.apply-patches.outputs.successful_patches }}" -eq "${{ steps.apply-patches.outputs.total_patches }}" ]; then
                    echo "✅ All PRO feature unlocking patches applied successfully!" >> patch-report.md
                    echo "GitLens PRO features have been fully unlocked." >> patch-report.md
                  else
                    echo "❌ Some patches failed to apply. Please review the details above." >> patch-report.md
                  fi

                  echo "" >> patch-report.md
                  echo "## Patch Application Log" >> patch-report.md
                  echo "```json" >> patch-report.md
                  cat patch-report.json | jq . >> patch-report.md
                  echo "```" >> patch-report.md

                  echo "\n=== Patch Report Generated ==="
                  cat patch-report.md

            - name: Display patch report summary
              run: |
                  echo "\n=== GitLens PRO Patch Processing Summary ==="
                  echo "Total patches: ${{ steps.apply-patches.outputs.total_patches }}"
                  echo "Successful: ${{ steps.apply-patches.outputs.successful_patches }}"
                  echo "Failed: ${{ steps.apply-patches.outputs.failed_patches }}"
                  echo "Verification result: ${{ steps.verify-patches.outputs.verification_result }}"
                  echo ""
                  echo "Detailed report available in patch-report.md and patch-report.json"

            # 5. 代码推送（仅在有实际修改时执行）
            - name: Configure git user
              run: |
                  git config user.name "GitHub Actions"
                  git config user.email "actions@github.com"

            - name: Check for changes
              id: check-changes
              run: |
                  if git diff --exit-code; then
                    echo "no_changes=true" >> $GITHUB_OUTPUT
                    echo "No changes detected, skipping commit and push"
                  else
                    echo "no_changes=false" >> $GITHUB_OUTPUT
                    echo "Changes detected, will commit and push"
                  fi

            - name: Commit changes
              if: steps.check-changes.outputs.no_changes == 'false'
              run: |
                  git add .
                  git commit -m "Unlock all PRO features and set default plan to enterprise"

            - name: Push changes
              if: steps.check-changes.outputs.no_changes == 'false'
              run: git push origin ${{ github.ref_name }}

            # 6. 构建与发布
            - name: Build VSIX package
              run: pnpm run package

            - name: Get VSIX file path
              id: get-vsix
              run: |
                  VSIX_FILE=$(find . -name "*.vsix" -type f | head -1)
                  echo "vsix_file=$VSIX_FILE" >> $GITHUB_OUTPUT
                  echo "vsix_filename=$(basename $VSIX_FILE)" >> $GITHUB_OUTPUT

            - name: Get build timestamp
              id: get-timestamp
              run: |
                  # 获取当前时间并格式化为YYYY-MM-DD HH:mm:ss
                  BUILD_TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S")
                  echo "build_timestamp=$BUILD_TIMESTAMP" >> $GITHUB_OUTPUT
                  echo "Build timestamp: $BUILD_TIMESTAMP"

            - name: Create Release
              id: create-release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: v${{ steps.get-current-version.outputs.current_version }}
                  release_name: GitLens PRO v${{ steps.get-current-version.outputs.current_version }}
                  body: |
                      ## GitLens PRO 自动化构建发布

                      ### 发布信息
                      - 构建编号: ${{ github.run_number }}
                      - 构建时间: ${{ steps.get-timestamp.outputs.build_timestamp }}
                      - 上游仓库: ${{ github.event.inputs.upstream_repository || 'gitkraken/vscode-gitlens' }}
                      - 上游分支: ${{ github.event.inputs.upstream_branch || 'main' }}
                      - 版本变更: ${{ steps.get-latest-release.outputs.latest_version }} → ${{ steps.get-current-version.outputs.current_version }}

                      ### 功能变更
                      - 解锁所有PRO功能
                      - 设置默认订阅计划为enterprise
                      - 同步上游仓库最新代码

                      ### 构建文件
                      - VSIX包: ${{ steps.get-vsix.outputs.vsix_filename }}
                  draft: false
                  prerelease: false

            - name: Upload Release Asset
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ steps.create-release.outputs.upload_url }}
                  asset_path: ${{ steps.get-vsix.outputs.vsix_file }}
                  asset_name: ${{ steps.get-vsix.outputs.vsix_filename }}
                  asset_content_type: application/vsix

            # 7. 错误处理与通知
            - name: Send notification on failure
              if: failure()
              uses: actions/github-script@v7
              with:
                  script: |
                      const notificationMessage = `GitLens PRO构建失败: ${context.workflow} #${context.runNumber}`;
                      console.log(notificationMessage);

                      // 可以添加Slack、Discord或Email通知
                      // 示例：发送到GitHub Issues
                      // await github.rest.issues.create({
                      //   owner: context.repo.owner,
                      //   repo: context.repo.repo,
                      //   title: notificationMessage,
                      //   body: `构建失败详情: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
                      // });

            - name: Cleanup
              if: always()
              run: |
                  # 清理临时文件
                  rm -f *.vsix
